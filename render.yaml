services:
  - type: web
    name: afiyi-wellness
    env: docker
    region: frankfurt
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:zZ6l2dZ+yE3hK4mP7R9sU1vW3xY5zA7bC9dE1fG3hI4=
      - key: APP_URL
        value: https://afiyi-wellness.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
